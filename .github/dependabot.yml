version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Kolkata
    open-pull-requests-limit: 10
    groups:
      next:
        patterns:
          - "next"
          - "eslint-config-next"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      firebase:
        patterns:
          - "firebase"
          - "firebase-admin"
      tooling:
        patterns:
          - "typescript"
          - "tsx"
          - "eslint*"
          - "prettier"
          - "@types/node"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
